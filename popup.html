<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #ffffff;
      width: 320px;
      min-height: 80px;
      padding: 12px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    header h1 { font-size: 14px; font-weight: 600; color: #111; }

    #regroup-btn {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: #f5f5f5;
      cursor: pointer;
      color: #444;
    }
    #regroup-btn:hover { background: #ebebeb; }

    #status {
      font-size: 12px;
      color: #666;
      text-align: center;
      padding: 20px 0;
    }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #ddd;
      border-top-color: #666;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error {
      display: none;
      font-size: 12px;
      color: #c0392b;
      background: #fdf0ed;
      border: 1px solid #f5c6c0;
      border-radius: 8px;
      padding: 10px 12px;
      line-height: 1.5;
    }

    #groups { display: none; }

    .group {
      margin-bottom: 10px;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      overflow: hidden;
      transition: opacity 0.2s;
    }

    .group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      background: #f7f7f7;
      border-bottom: 1px solid #e8e8e8;
    }

    .group-name-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .group-name { font-weight: 600; font-size: 12px; color: #222; }

    .group-status-badge {
      font-size: 9px;
      font-weight: 600;
      background: #e0e0e0;
      color: #666;
      border-radius: 4px;
      padding: 1px 5px;
    }

    .group-actions { display: flex; gap: 5px; }

    .btn-sleep, .btn-wake, .btn-close {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-sleep  { background: #e8f4fd; color: #1a6fa3; }
    .btn-sleep:hover  { background: #d0e9f8; }

    .btn-wake   { background: #e8f5e9; color: #2e7d32; }
    .btn-wake:hover   { background: #d0edda; }

    .btn-close  { background: #fdecea; color: #a33030; }
    .btn-close:hover  { background: #f8d7d5; }

    /* Asleep state */
    .group-asleep { opacity: 0.65; }
    .group-asleep .group-header { background: #f0f0f0; }

    .tab-list { list-style: none; padding: 4px 0; }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: #333;
      line-height: 1.3;
    }
    .tab-item:hover { background: #fafafa; }

    .tab-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-asleep .tab-title {
      color: #aaa;
      text-decoration: line-through;
    }

    .badge-frequent {
      font-size: 9px;
      font-weight: 600;
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffc107;
      border-radius: 4px;
      padding: 1px 5px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Tab Agent</h1>
    <button id="regroup-btn">Regroup</button>
  </header>

  <div id="status">
    <span class="spinner"></span> Grouping your tabs...
  </div>

  <div id="error"></div>
  <div id="groups"></div>

  <script src="storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
